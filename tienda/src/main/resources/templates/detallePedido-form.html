<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle</title>

    <style>
        body{
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        /* TARJETA */
        .card{
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding:30px;
            border-radius:20px;
            width:350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align:center;
            color:white;
        }

        /* INPUTS */
        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            outline:none;
            background: rgba(255,255,255,0.2);
            color:white;
            font-size:0.9em;
            box-sizing:border-box;
            transition:0.3s;
        }

        input::placeholder{
            color:rgba(255,255,255,0.7);
        }

        input:focus{
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }

        /* BOTON */
        button{
            background: #00c9a7;
            color:white;
            padding:12px;
            border:none;
            width:100%;
            border-radius:10px;
            font-weight:bold;
            margin-top:10px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#00e6be;
            transform:translateY(-2px);
        }

        button:active{
            transform:scale(0.98);
        }
    </style>
</head>

<body>

<div class="card">

    <h2 th:text="${modoEdicion} ? 'Editar' : 'Nuevo'"></h2>

    <form th:action="${modoEdicion} ? @{'/api/detallePedido/actualizar/' + ${detallePedido.idDetalle}} : @{/api/detallePedido/guardar}"
          th:object="${detallePedido}" method="post">

        <input type="number" th:field="*{cantidadDetalle}" placeholder="Cantidad">
        <input type="number" th:field="*{precioDetalle}" placeholder="Precio">
        <input type="number" th:field="*{idPedido}" placeholder="Pedido">
        <input type="number" th:field="*{idProducto}" placeholder="Producto">

        <button>Guardar</button>

    </form>

</div>

</body>
</html>
