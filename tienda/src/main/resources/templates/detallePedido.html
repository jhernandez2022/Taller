<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle Pedido</title>

    <style>
        body{
            font-family: 'Poppins', sans-serif;
            background:#eef2f7;
            padding:40px;
            margin:0;
            color:#2d3436;
        }

        /* TITULO */
        h2{
            text-align:center;
            margin-bottom:30px;
            font-size:2em;
            font-weight:600;
        }

        /* BOTÓN BASE (evita afectar TODOS los links) */
        .btn{
            display:inline-block;
            padding:10px 16px;
            border-radius:8px;
            text-decoration:none;
            color:white;
            transition:0.3s;
            margin-right:8px;
        }

        .btn:hover{
            transform:translateY(-2px);
            opacity:0.9;
        }

        /* BOTÓN PRIMARIO */
        .btn-primary{
            background:#0984e3;
        }

        .btn-primary:hover{
            background:#74b9ff;
        }

        /* BOTÓN ELIMINAR */
        .btn-danger{
            background:#d63031;
            padding:6px 10px;
            border-radius:6px;
        }

        .btn-danger:hover{
            background:#ff7675;
        }

        /* TABLA */
        table{
            width:100%;
            background:white;
            border-collapse:collapse;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
        }

        th{
            background:#2d3436;
            color:white;
            padding:14px;
            font-weight:500;
            letter-spacing:0.5px;
        }

        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #dfe6e9;
        }

        tr:hover{
            background:#f1f5f9;
        }
    </style>
</head>

<body>

<h2>Detalle Pedido</h2>

<a th:href="@{/api/detallePedido/nuevo}">NuevoProducto</a>
<a th:href="@{/home}">Volver</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Pedido</th>
        <th>Producto</th>
        <th>Acciones</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="d : ${detallePedidos}">
        <td th:text="${d.idDetalle}"></td>
        <td th:text="${d.cantidadDetalle}"></td>
        <td th:text="${d.precioDetalle}"></td>
        <td th:text="${d.idPedido}"></td>
        <td th:text="${d.idProducto}"></td>
        <td>
            <a th:href="@{'/api/detallePedido/editar/' + ${d.idDetalle}}">Editar</a>
            <a class="btn-eliminar" th:href="@{'/api/detallePedido/eliminar/' + ${d.idDetalle}}">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
